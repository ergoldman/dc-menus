<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Menus</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f3a68">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DC Menus">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #16213a;
    --ink-soft: #5a6478;
    --paper: #fbfaf6;
    --card: #ffffff;
    --line: #e7e3d8;
    --aggie-blue: #1f3a68;
    --aggie-gold: #d9a818;
    --green: #2e7d52;
    --green-bg: #e6f2ea;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(22,33,58,.04), 0 8px 24px rgba(22,33,58,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 18px 80px; }

  /* Header */
  header {
    padding: 34px 0 22px;
  }
  .kicker {
    font-size: 12px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
    color: var(--aggie-gold);
  }
  h1 {
    font-size: clamp(30px, 6vw, 46px); font-weight: 800; letter-spacing: -.02em;
    line-height: 1.02; margin-top: 6px;
    font-family: Georgia, "Times New Roman", serif;
    color: var(--aggie-blue);
  }
  .sub { color: var(--ink-soft); font-size: 14px; margin-top: 10px; }

  /* Sticky control bar */
  .controls {
    position: sticky; top: 0; z-index: 20;
    background: rgba(251,250,246,.86); backdrop-filter: blur(8px);
    padding: 12px 0; margin: 8px 0 18px;
    border-bottom: 1px solid var(--line);
  }
  .segrow { display: flex; gap: 8px; flex-wrap: wrap; }
  .seg {
    display: inline-flex; background: #fff; border: 1px solid var(--line);
    border-radius: 999px; padding: 3px; gap: 2px;
  }
  .seg button {
    border: 0; background: transparent; cursor: pointer;
    font: inherit; font-size: 13.5px; font-weight: 600; color: var(--ink-soft);
    padding: 7px 15px; border-radius: 999px; transition: all .15s;
  }
  .seg button[aria-pressed="true"] { background: var(--aggie-blue); color: #fff; }
  .seg.meals button[aria-pressed="true"] { background: var(--aggie-gold); color: var(--ink); }

  .filterrow { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
  .search {
    flex: 1; min-width: 160px; border: 1px solid var(--line); background: #fff;
    border-radius: 999px; padding: 9px 16px; font: inherit; font-size: 14px; color: var(--ink);
  }
  .search:focus { outline: 2px solid var(--aggie-gold); outline-offset: 1px; }
  .chip {
    border: 1px solid var(--line); background: #fff; cursor: pointer;
    font: inherit; font-size: 13px; font-weight: 600; color: var(--ink-soft);
    padding: 7px 13px; border-radius: 999px; transition: all .15s;
  }
  .chip[aria-pressed="true"] { background: var(--green-bg); color: var(--green); border-color: #bcdcc8; }

  /* Meta line */
  .meta { font-size: 12.5px; color: var(--ink-soft); margin: 4px 2px 16px; }
  .meta b { color: var(--ink); font-weight: 700; }

  /* Zone groups */
  .zone { margin-bottom: 26px; }
  .zone-head {
    display: flex; align-items: baseline; gap: 10px; margin: 0 2px 10px;
  }
  .zone-dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .zone-name { font-size: 13px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
  .zone-count { font-size: 12px; color: var(--ink-soft); }

  /* Dish cards */
  .grid { display: grid; gap: 10px; }
  .dish {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 16px; cursor: pointer;
    transition: border-color .15s, transform .05s;
  }
  .dish:hover { border-color: #d4cdb8; }
  .dish:active { transform: scale(.997); }
  .dish-top { display: flex; align-items: flex-start; gap: 12px; }
  .dish-name { font-weight: 700; font-size: 16px; flex: 1; }
  .star {
    border: 0; background: transparent; cursor: pointer; font-size: 19px; line-height: 1;
    color: #d8d2c2; flex: none; padding: 0 2px; transition: transform .1s;
  }
  .star.on { color: var(--aggie-gold); }
  .star:active { transform: scale(1.25); }
  .dish-desc { color: var(--ink-soft); font-size: 13.5px; margin-top: 5px; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 9px; align-items: center; }
  .tag {
    font-size: 11px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 6px;
  }
  .tag.diet { background: var(--green-bg); color: var(--green); }
  .tag.cal { background: #f0eee6; color: var(--ink-soft); }
  .dish-more { display: none; margin-top: 11px; padding-top: 11px; border-top: 1px dashed var(--line); font-size: 13px; color: var(--ink-soft); }
  .dish.open .dish-more { display: block; }
  .dish-more b { color: var(--ink); }

  /* Empty + loading */
  .state { text-align: center; padding: 70px 20px; color: var(--ink-soft); }
  .state h3 { color: var(--ink); font-size: 18px; margin-bottom: 6px; }
  .state code { background: #f0eee6; padding: 2px 7px; border-radius: 6px; font-size: 13px; }

  /* Favorites bar */
  .favbar {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 18px; z-index: 30;
    background: var(--aggie-blue); color: #fff; border-radius: 999px;
    padding: 11px 20px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 28px rgba(22,33,58,.28);
    display: none; align-items: center; gap: 10px; cursor: pointer; border: 0; font-family: inherit;
  }
  .favbar.show { display: inline-flex; }
  .favbar .n { background: var(--aggie-gold); color: var(--ink); border-radius: 999px; padding: 1px 9px; font-weight: 800; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">UC Davis Dining</div>
    <h1>Today at the DCs</h1>
    <div class="sub" id="sub">Loading menus…</div>
  </header>

  <div class="controls" id="controls" style="display:none">
    <div class="segrow">
      <div class="seg dcs" id="dcSeg"></div>
      <div class="seg meals" id="mealSeg"></div>
    </div>
    <div class="filterrow">
      <input class="search" id="search" placeholder="Search dishes…" autocomplete="off">
      <button class="chip" data-diet="Vegan" aria-pressed="false">Vegan</button>
      <button class="chip" data-diet="Vegetarian" aria-pressed="false">Vegetarian</button>
      <button class="chip" data-diet="Halal" aria-pressed="false">Halal</button>
      <button class="chip" id="favOnly" aria-pressed="false">★ Favorites</button>
      <button class="chip" id="notifyBtn" style="border-color:#bcd0ec;color:#1f3a68">🔔 Notify me</button>
    </div>
  </div>

  <div class="meta" id="meta"></div>
  <div id="content"></div>
</div>

<button class="favbar" id="favbar">
  <span>★ Your favorites</span><span class="n" id="favN">0</span>
</button>

<script>
const ZONE_COLORS = {
  "Red Zone": "#c0392b", "Yellow Zone": "#d9a818", "Blue Zone": "#1f3a68",
  "Green Zone": "#2e7d52", "Pink Zone": "#c2517a", "Purple Zone": "#6b4e9e",
};
const MEAL_ORDER = ["Breakfast", "Lunch", "Dinner"];

let DATA = [];
let favorites = new Set(JSON.parse(localStorage.getItem("dcFavorites") || "[]"));
let state = { dc: null, meal: null, diets: new Set(), favOnly: false, q: "" };

function saveFavs() {
  localStorage.setItem("dcFavorites", JSON.stringify([...favorites]));
  renderFavBar();
  if (typeof syncFavoritesToServer === "function") syncFavoritesToServer();
}
function dishKey(d) { return `${d.dc}|${d.name}`; }

async function load() {
  try {
    const res = await fetch("menus.json?t=" + Date.now());
    if (!res.ok) throw new Error("not found");
    DATA = await res.json();
  } catch (e) {
    document.getElementById("sub").innerHTML =
      `Couldn't load <code>menus.json</code>. Keep it in the same folder as this page and open via a local server.`;
    document.getElementById("content").innerHTML = emptyState(
      "No menu data yet",
      `Run <code>python scrape.py</code> to create <code>menus.json</code>, then put it next to this file.`
    );
    return;
  }
  const dcs = DATA.filter(d => (d.dishes||[]).length);
  if (!dcs.length) {
    document.getElementById("sub").textContent = "Menus are empty right now — try again later.";
    return;
  }
  state.dc = dcs[0].dc;
  // pick first meal that has dishes
  state.meal = MEAL_ORDER.find(m => dcs[0].dishes.some(x => x.meal === m)) || dcs[0].dishes[0].meal;

  buildSegs(dcs);
  document.getElementById("controls").style.display = "block";
  const when = new Date(dcs[0].scrapedAt || Date.now());
  document.getElementById("sub").textContent =
    `Updated ${when.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"})}`;
  wireControls();
  renderFavBar();
  render();
}

function buildSegs(dcs) {
  const dcSeg = document.getElementById("dcSeg");
  dcSeg.innerHTML = dcs.map(d =>
    `<button data-dc="${d.dc}" aria-pressed="${d.dc===state.dc}">${d.dc}</button>`).join("");
  const mealSeg = document.getElementById("mealSeg");
  mealSeg.innerHTML = MEAL_ORDER.map(m =>
    `<button data-meal="${m}" aria-pressed="${m===state.meal}">${m}</button>`).join("");
}

function wireControls() {
  document.getElementById("dcSeg").addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    state.dc = b.dataset.dc; syncPressed("dcSeg","dc",state.dc); render();
  });
  document.getElementById("mealSeg").addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    state.meal = b.dataset.meal; syncPressed("mealSeg","meal",state.meal); render();
  });
  document.querySelectorAll(".chip[data-diet]").forEach(chip => {
    chip.addEventListener("click", () => {
      const d = chip.dataset.diet;
      state.diets.has(d) ? state.diets.delete(d) : state.diets.add(d);
      chip.setAttribute("aria-pressed", state.diets.has(d));
      render();
    });
  });
  const favBtn = document.getElementById("favOnly");
  favBtn.addEventListener("click", () => {
    state.favOnly = !state.favOnly;
    favBtn.setAttribute("aria-pressed", state.favOnly);
    render();
  });
  document.getElementById("search").addEventListener("input", e => {
    state.q = e.target.value.trim().toLowerCase(); render();
  });
  document.getElementById("favbar").addEventListener("click", () => {
    state.favOnly = true; favBtn.setAttribute("aria-pressed", true);
    window.scrollTo({top:0,behavior:"smooth"}); render();
  });
}
function syncPressed(segId, attr, val) {
  document.querySelectorAll(`#${segId} button`).forEach(b =>
    b.setAttribute("aria-pressed", b.dataset[attr] === val));
}

function currentDishes() {
  const dc = DATA.find(d => d.dc === state.dc);
  if (!dc) return [];
  return (dc.dishes||[]).filter(x => {
    if (x.meal !== state.meal) return false;
    if (state.q && !x.name.toLowerCase().includes(state.q) &&
        !(x.description||"").toLowerCase().includes(state.q)) return false;
    for (const d of state.diets) if (!(x.dietary||[]).includes(d)) return false;
    if (state.favOnly && !favorites.has(dishKey(x))) return false;
    return true;
  });
}

function render() {
  const dishes = currentDishes();
  const meta = document.getElementById("meta");
  const content = document.getElementById("content");

  meta.innerHTML = `<b>${dishes.length}</b> ${dishes.length===1?"dish":"dishes"} · ${state.dc} · ${state.meal}` +
    (state.diets.size ? ` · ${[...state.diets].join(", ")}` : "") +
    (state.favOnly ? " · favorites only" : "");

  if (!dishes.length) {
    content.innerHTML = emptyState(
      state.favOnly ? "No favorites here yet" : "Nothing matches",
      state.favOnly ? "Tap the ★ on any dish to save it, and it'll show up here."
                    : "Try clearing a filter or searching something else."
    );
    return;
  }

  // group by zone, in color order
  const byZone = {};
  for (const d of dishes) (byZone[d.zone||"Menu"] ??= []).push(d);
  const zones = Object.keys(byZone).sort((a,b) =>
    Object.keys(ZONE_COLORS).indexOf(a) - Object.keys(ZONE_COLORS).indexOf(b));

  content.innerHTML = zones.map(z => `
    <section class="zone">
      <div class="zone-head">
        <span class="zone-dot" style="background:${ZONE_COLORS[z]||'#999'}"></span>
        <span class="zone-name">${z}</span>
        <span class="zone-count">${byZone[z].length}</span>
      </div>
      <div class="grid">${byZone[z].map(dishCard).join("")}</div>
    </section>`).join("");

  content.querySelectorAll(".dish").forEach(card => {
    card.addEventListener("click", e => {
      if (e.target.closest(".star")) return;
      card.classList.toggle("open");
    });
  });
  content.querySelectorAll(".star").forEach(star => {
    star.addEventListener("click", () => {
      const k = star.dataset.key;
      favorites.has(k) ? favorites.delete(k) : favorites.add(k);
      star.classList.toggle("on", favorites.has(k));
      saveFavs();
      if (state.favOnly) render();
    });
  });
}

function dishCard(d) {
  const k = dishKey(d);
  const on = favorites.has(k);
  const diet = (d.dietary||[]).map(t => `<span class="tag diet">${t}</span>`).join("");
  const cal = d.calories != null ? `<span class="tag cal">${Math.round(d.calories)} cal</span>` : "";
  const allergens = (d.allergens||[]).filter(a => a && a!=="No major allergens");
  const more = `
    ${d.description ? `<div>${esc(d.description)}</div>` : ""}
    <div style="margin-top:6px"><b>Allergens:</b> ${allergens.length ? esc(allergens.join(", ")) : "None listed"}</div>`;
  return `
    <article class="dish">
      <div class="dish-top">
        <div class="dish-name">${esc(d.name)}</div>
        <button class="star ${on?'on':''}" data-key="${esc(k)}" aria-label="Save favorite">${on?'★':'☆'}</button>
      </div>
      ${d.description ? `<div class="dish-desc">${esc(d.description)}</div>` : ""}
      <div class="tags">${diet}${cal}</div>
      <div class="dish-more">${more}</div>
    </article>`;
}

function emptyState(h, p) {
  return `<div class="state"><h3>${h}</h3><div>${p}</div></div>`;
}
function renderFavBar() {
  const bar = document.getElementById("favbar");
  document.getElementById("favN").textContent = favorites.size;
  bar.classList.toggle("show", favorites.size > 0 && !state.favOnly);
}
function esc(s){ return String(s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// ---- Push notifications ----
const SUPABASE_URL = "https://hpybopesfbvoqrnrujgf.supabase.co";
const SUPABASE_KEY = "sb_publishable_ArsuTmaiaRP9iV-ZsZNhDw_XSoGJ4zp";
const VAPID_PUBLIC = "BHxaJo5FIVWYHlBcdC7PLDCAZVhNHzrcSL-M7NnBpFmV2aolU-qKve1Zfdm2JhFVLbP6BUelzxA1q6GOnGK7oaM";

let supabase = null;
try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch (e) {}

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base64);
  return Uint8Array.from([...raw].map((c) => c.charCodeAt(0)));
}

async function enableNotifications() {
  const btn = document.getElementById("notifyBtn");
  if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
    alert("Your browser doesn't support notifications. On iPhone, add this app to your Home Screen first (Share → Add to Home Screen), then open it from there.");
    return;
  }
  try {
    btn.textContent = "…";
    const permission = await Notification.requestPermission();
    if (permission !== "granted") {
      btn.textContent = "🔔 Notify me";
      alert("Notifications are blocked. You can re-enable them in your browser settings.");
      return;
    }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC),
    });
    const json = sub.toJSON();

    // Save subscription
    const { data: subRow, error: subErr } = await supabase
      .from("subscriptions")
      .upsert({ endpoint: json.endpoint, p256dh: json.keys.p256dh, auth: json.keys.auth },
              { onConflict: "endpoint" })
      .select()
      .single();
    if (subErr) throw subErr;

    // Save current favorites (by dish name) linked to this subscription
    const names = [...new Set([...favorites].map((k) => k.split("|")[1]))];
    if (names.length) {
      await supabase.from("favorites").delete().eq("subscription_id", subRow.id);
      await supabase.from("favorites").insert(
        names.map((n) => ({ subscription_id: subRow.id, dish_name: n }))
      );
    }
    localStorage.setItem("dcSubId", subRow.id);
    btn.textContent = "🔔 On";
    btn.setAttribute("aria-pressed", "true");
    alert("Done! You'll get a notification when one of your favorites is on the menu. Add ★ favorites and they'll be included automatically.");
  } catch (e) {
    btn.textContent = "🔔 Notify me";
    alert("Couldn't enable notifications: " + (e.message || e));
  }
}

// Keep server favorites in sync when user stars/unstars (only if they've subscribed)
async function syncFavoritesToServer() {
  const subId = localStorage.getItem("dcSubId");
  if (!subId || !supabase) return;
  const names = [...new Set([...favorites].map((k) => k.split("|")[1]))];
  try {
    await supabase.from("favorites").delete().eq("subscription_id", subId);
    if (names.length) {
      await supabase.from("favorites").insert(
        names.map((n) => ({ subscription_id: subId, dish_name: n }))
      );
    }
  } catch (e) {}
}

document.getElementById("notifyBtn").addEventListener("click", enableNotifications);

load();

// Register service worker for installability + offline support
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
